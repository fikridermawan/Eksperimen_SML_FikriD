name: Automated Preprocessing Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'credit_risk_dataset_raw.csv'
      - 'preprocessing/automate_FikriD.py'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for triggering manual preprocessing'
        required: false
        default: 'Triggered manually'

jobs:
  preprocessing:
    name: Run Preprocessing Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Run preprocessing script
        run: |
          python preprocessing/automate_FikriD.py \
            --input credit_risk_dataset_raw.csv \
            --output preprocessing/credit_risk_preprocessing

      - name: Verify output
        run: |
          ls -lh preprocessing/credit_risk_preprocessing/
          echo "Total files: $(ls preprocessing/credit_risk_preprocessing/ | wc -l)"

      - name: Commit preprocessed dataset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add preprocessing/credit_risk_preprocessing/
          git diff --staged --quiet || git commit -m "chore: update preprocessed dataset [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
