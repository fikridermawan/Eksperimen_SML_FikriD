name: Automated Preprocessing Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'credit_risk_dataset_raw.csv'
      - 'preprocessing/automate_NamaAnda.py'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Alasan menjalankan preprocessing manual'
        required: false
        default: 'Triggered manually'

jobs:
  preprocessing:
    name: Run Preprocessing Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn

      - name: Run automate preprocessing
        run: |
          python preprocessing/automate_NamaAnda.py \
            --input credit_risk_dataset_raw.csv \
            --output preprocessing/credit_risk_preprocessing

      - name: Verify output files
        run: |
          echo "=== Verifikasi output preprocessing ==="
          ls -lh preprocessing/credit_risk_preprocessing/
          echo "Jumlah file: $(ls preprocessing/credit_risk_preprocessing/ | wc -l)"

      - name: Commit and push preprocessed dataset
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add preprocessing/credit_risk_preprocessing/
          git diff --staged --quiet || git commit -m "chore: update preprocessed dataset [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
